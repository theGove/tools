<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Monaco Editor Example</title>
    <style>
        .monaco {
            width: 600px;
        }
        .editor {
            height: 200px;
            margin: 10px;
            padding: 0;
        }
        .console {
            height: 200px;
            margin: 10px;
            padding: 0;
            background-color: "#1e1e1e";
        }
    </style>
    <script src="https://unpkg.com/monaco-editor@latest/min/vs/loader.js"></script>
    <script>
        const codeEditors={}
    function initMonaco(){
        require.config({ paths: { 'vs': 'https://unpkg.com/monaco-editor@latest/min/vs' }});
        window.MonacoEnvironment = { getWorkerUrl: () => proxy };

        function proxy(){ URL.createObjectURL(new Blob([`
            self.MonacoEnvironment = {
                baseUrl: 'https://unpkg.com/monaco-editor@latest/min/'
            };
            importScripts('https://unpkg.com/monaco-editor@latest/min/vs/base/worker/workerMain.js');
        `], { type: 'text/javascript' }));
        }
        require(["vs/editor/editor.main"], function () {
            const containers = document.querySelectorAll(".monaco")
            for(let x=0;x < containers.length;x++){
                const container = containers[x]
                container.id = "code"+x
                const code = container.innerHTML.trim()
                const div = document.createElement("div")
                div.className = "editor"
                const con = document.createElement("div")
                con.className = "console"
                con.style.display = "none"
                const button = document.createElement("button")
                button.appendChild(document.createTextNode("Run Code"))
                button.addEventListener('click', runCode);
                container.appendChild(button)
                container.appendChild(con)


                codeEditors["code"+x] = monaco.editor.create(div, {
                    value: code,
                    language: 'javascript',
                    theme: 'vs-dark'
                });
            }

        }); 

    }    

    function runCode(evt) {
        debugger

        const code = codeEditors[evt.target.parentElement.id].getValue();
        window.userConsole = evt.target.parentElement.querySelector(".console")
        console.log(window.userConsole)
        const s = document.createElement("script")
        s.replaceChildren(code)
        document.head.appendChild(s)

    }
    function init(){
        initMonaco()
        // configure console.log to log to the browser console as well as the current example
        window.console = console.log;
        console.log = function(...args) {
            
            window.console.apply(console, args);
            if(window.userConsole){
                // only write to the user console if it has been initialized by a run
                const div = document.createElement("div")
                window.userConsole.appendChild(div)
                window.userConsole.style.display="block"
                window.userConsole = null
            }
        };

    }
    </script>
</head>
<body onload="init()">
    <h2>Edit JavaScript Function</h2>
    <div class="monaco">
function myFunction() {
	console.log("Hello world!");
}
myFunction()
    </div>
    <div class="monaco">
function yourFunction() {
	console.log("Goodbye, cruel world!")
}
yourFunction()
    </div>

</body>
</html>
